apiVersion: apps/v1
kind: Deployment
metadata:
  name: ey-cart-Deployment
  namespace: surya-ns
  labels:
    app: ey-cart
spec:
  replicas: 3
  selector:
    matchLabels:
      app: deploy
  template:
    metadata:
      labels:
        app: deploy
      spec:
        containers:
          - name: ey-cart-container
            image: muralisocial123/ey-cart:v1.1.0
            ports:
              - containerPort: 3000

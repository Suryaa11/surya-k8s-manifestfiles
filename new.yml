apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  label:
    app: nginx-app
spec:
  containers:
    - name: nginx-cont
      image: nginx
      ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx-app
  ports:
    
apiVersion: apps/v1
kind: ReplicaSet
metadata: 
  name: ey-cart-rs
  namespace: surya-ns
  labels:
    app: cart
spec: # It defines the behaviour of replica set
  replicas: 3
  selector:  # It defines how the ReplicaSet finds which Pod to manage
    matchLabels:
      app: web
  template: # It contains Pod definition
    metadata: 
      labels: 
        app: web
    spec: # It contains container definition
      containers:
        - name: ui-cart-container
          image: muralisocial123/ey-cart:v1.1.0
          ports: 
            - containerPort: 3000